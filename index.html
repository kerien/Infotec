<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe Técnico</title>
<style>
:root {
  --blue: #0078D4;
  --blue-hover: #0063b1;
  --success: #27ae60;
  --success-hover: #219150;
  --neutral: #f3f6fb;
  --border-light: #cfe0f5;
}
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: var(--blue);
  display: flex;
  justify-content: center;
  padding: 16px;
}
.container {
  width: 100%;
  max-width: 900px;
  background: #fff;
  border-radius: 14px;
  padding: 22px;
  box-shadow: 0 25px 60px rgba(0,0,0,.25);
}
h2 { text-align: center; color: var(--blue); margin-bottom: 24px; }
h3 { color: var(--blue); border-left: 5px solid var(--blue); padding-left: 10px; font-size: 16px; }
.card { border: 1px solid #e9e9e9; border-radius: 12px; padding: 16px; margin-bottom: 18px; box-shadow: 0 2px 10px rgba(0,0,0,.04); }
input, textarea, select {
  width: 100%; padding: 11px; margin-top: 8px; margin-bottom: 12px;
  border: 1px solid #d0d0d0; border-radius: 8px; box-sizing: border-box;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,120,212,.2); outline: none;
}
label { display: block; font-size: 13px; margin-top: 10px; margin-bottom: 6px; color: #333; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
button {
  width: 100%; padding: 14px; border: none; border-radius: 10px;
  font-weight: 600; cursor: pointer; transition: .2s;
}
button[type="submit"]       { background: var(--blue); color: #fff; }
button[type="submit"]:hover { background: var(--blue-hover); transform: translateY(-1px); }
#previewBtn { background: var(--neutral); color: var(--blue); border: 1px solid var(--border-light); }
#copyBtn {
  display: block; margin-top: 10px; background: var(--success); color: #fff;
  opacity: 0; pointer-events: none; transition: opacity .3s ease;
}
#copyBtn:hover { background: var(--success-hover); }
#previewBox {
  margin-top: 15px; border: 1px solid #ddd;
  max-height: 0; opacity: 0; overflow: hidden;
  transition: max-height .4s ease, opacity .3s ease, padding .3s ease;
  padding: 0 25px;
}
#previewBox.open { max-height: 9999px; opacity: 1; padding: 25px; }
@media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="container">
  <h2>🧾 Informe Técnico</h2>
  <form id="form">

    <div class="card">
      <h3>Contacto en Sitio</h3>
      <div class="grid">
        <input name="nombre" placeholder="Nombre y Apellido">
        <input name="cargo" placeholder="Cargo">
      </div>
      <div class="grid">
        <input name="mail" placeholder="Mail">
        <input name="telefono" placeholder="Teléfono/Celular">
      </div>
    </div>

    <div class="card">
      <h3>Actualización de datos</h3>
      <label>Se generó Formulario de actualización de datos del establecimiento? (Si/No)</label>
      <select name="actualizacion_datos">
        <option>SI</option>
        <option>NO</option>
      </select>
    </div>

    <div class="card">
      <h3>Status de conectividad</h3>
      <label>Inspección Estado enlaces (Routers/ONT/CPE)</label>
      <input name="inspeccion_enlaces">
      <label>Informe Conectividad Wireless</label>
      <input name="informe_wireless">
      <div class="grid">
        <input name="speedtest_wireless_descarga" placeholder="Descarga Wireless (solo valores)">
        <input name="speedtest_wireless_carga"    placeholder="Carga Wireless (solo valores)">
      </div>
      <label>Informe Conectividad LAN</label>
      <input name="informe_lan">
      <div class="grid">
        <input name="speedtest_lan_descarga" placeholder="Descarga LAN (solo valores)">
        <input name="speedtest_lan_carga"    placeholder="Carga LAN (solo valores)">
      </div>
      <label>Red Comunidad Activa</label>
      <select name="red_comunidad_activa">
        <option>SI</option>
        <option>NO</option>
      </select>
      <label>Usuarios SADE</label>
      <input name="usuarios_sade">
    </div>

    <div class="card">
      <h3>Resolución</h3>
      <textarea name="resolucion" style="min-height:180px"></textarea>
    </div>

    <div class="card">
      <h3>Vista previa del informe</h3>
      <button type="button" id="previewBtn">Ver vista previa</button>
      <button type="button" id="copyBtn">📋 Copiar Informe con Diseño</button>
      <div id="previewBox"></div>
    </div>

    <button type="submit">Enviar Informe</button>
  </form>
</div>

<script>
var val = function(name) {
  var el = document.querySelector('[name="' + name + '"]');
  return el ? el.value.trim() : '';
};
var esc = function(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
};

/* ─── HTML del documento (estilos 100% inline) ─── */
var TNR   = 'font-family:Times New Roman,Times,serif;';
var BASE  = TNR + 'font-size:12pt;color:#000;';
var TDST  = BASE + 'padding:3px 6px;vertical-align:top;border:1px dotted #999;';

function row(label, value) {
  return '<tr>'
    + '<td style="' + TDST + 'width:29%;">' + label + '</td>'
    + '<td style="' + TDST + '">' + (value || '') + '</td>'
    + '</tr>';
}

function generarHTML() {
  var sd = esc(val('speedtest_wireless_descarga')) || '-';
  var sc = esc(val('speedtest_wireless_carga'))    || '-';
  var ld = esc(val('speedtest_lan_descarga'))      || '-';
  var lc = esc(val('speedtest_lan_carga'))         || '-';
  var TBL = 'width:100%;border-collapse:collapse;' + BASE + 'margin-bottom:6px;';
  var SEC = TNR + 'font-size:14pt;font-weight:bold;color:#000;margin:18px 0 6px;padding:0;';

  var h = '';
  h += '<div style="' + TNR + 'font-size:12pt;color:#000;max-width:800px;margin:auto;padding:20px;background:#fff;line-height:1.4;">';
  h += '<p style="' + TNR + 'font-size:24pt;font-weight:bold;color:#000;margin:0 0 6px;padding:0;">Informe T&eacute;cnico</p>';
  h += '<p style="' + BASE + 'margin:0 0 14px;padding:0;">Completar la totalidad de los campos que figuran a continuacion:</p>';

  h += '<p style="' + SEC + '">Contacto en Sitio</p>';
  h += '<table style="' + TBL + '">';
  h += row('Nombre y Apellido', esc(val('nombre')));
  h += row('Cargo',             esc(val('cargo')));
  h += row('Mail',              esc(val('mail')));
  h += row('Telefono/Celular',  esc(val('telefono')));
  h += '</table>';

  h += '<p style="' + BASE + 'font-weight:bold;margin:18px 0 10px;padding:0;">'
     + 'Se genero Formulario de actualizaci&oacute;n de datos del establecimiento? (Si/No):&nbsp;'
     + '<span style="font-weight:normal;">' + esc(val('actualizacion_datos')) + '</span></p>';

  h += '<p style="' + SEC + '">Status de conectividad</p>';
  h += '<table style="' + TBL + '">';
  h += row('Inspeccion Estado enlaces (Routers/ONT/CPE)', esc(val('inspeccion_enlaces')));
  h += row('Informe Conectividad Wireless',               esc(val('informe_wireless')));
  h += row('Speedtest red wireless (solo valores)',        'Descarga: ' + sd + ' Mb/s &nbsp;&nbsp; Carga: ' + sc + ' Mb/s');
  h += row('Informe Conectividad LAN',                    esc(val('informe_lan')));
  h += row('Speedtest red LAN (solo valores)',             'Descarga: ' + ld + ' Mb/s &nbsp;&nbsp; Carga: ' + lc + ' Mb/s');
  h += row('Red Comunidad Activa (SI/NO)',                 esc(val('red_comunidad_activa')));
  h += row('Usuarios SADE (separados por coma)',           esc(val('usuarios_sade')));
  h += '</table>';

  h += '<p style="' + SEC + '">Resoluci&oacute;n</p>';
  h += '<p style="' + BASE + 'margin:0 0 6px;padding:0;">Informar en detalle las actividades realizadas, incluyendo comunicacion mantenida con otros soportes (Centro de Monitoreo, MDE, proveedores, etc) para arribar a la solucion.</p>';
  h += '<table style="' + TBL + '">';
  h += '<tr><td style="' + TDST + 'height:300px;white-space:pre-wrap;">' + esc(val('resolucion')) + '</td></tr>';
  h += '</table>';
  h += '</div>';
  return h;
}

/* ─── refs ─── */
var previewBox     = document.getElementById('previewBox');
var copyBtn        = document.getElementById('copyBtn');
var previewBtn     = document.getElementById('previewBtn');

function mostrarBotonesExport(visible) {
  var v = visible ? '1' : '0';
  var p = visible ? 'auto' : 'none';
  copyBtn.style.opacity       = v;
  copyBtn.style.pointerEvents = p;
}

/* ─── toggle vista previa ─── */
previewBtn.addEventListener('click', function() {
  var open = previewBox.classList.contains('open');
  if (open) {
    previewBox.classList.remove('open');
    mostrarBotonesExport(false);
    previewBtn.textContent = 'Ver vista previa';
  } else {
    previewBox.innerHTML = generarHTML();
    previewBox.classList.add('open');
    mostrarBotonesExport(true);
    previewBtn.textContent = 'Ocultar vista previa';
  }
});

/* ─── copiar ─── */
copyBtn.addEventListener('click', async function() {
  var html = generarHTML();
  var tmp  = document.createElement('div');
  tmp.innerHTML = html;
  try {
    await navigator.clipboard.write([new ClipboardItem({
      'text/html':  new Blob([html],          { type: 'text/html' }),
      'text/plain': new Blob([tmp.innerText], { type: 'text/plain' })
    })]);
    copyBtn.textContent = '✔ Copiado';
    setTimeout(function() { copyBtn.textContent = '📋 Copiar Informe con Diseño'; }, 1500);
  } catch(e) { alert('Error al copiar'); }
});

</script>

</body>
</html>
